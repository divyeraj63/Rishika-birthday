<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Gullumullu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
}

/* Stars background */
.stars{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation:moveStars 80s linear infinite;
z-index:-1;
opacity:0.5;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* Pages */
.page{
position:absolute;
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
background:rgba(0,0,0,0.6);
}

.active{
display:flex;
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

h1{
font-size:3rem;
margin-bottom:20px;
}

p{
max-width:800px;
font-size:1.3rem;
line-height:1.8;
}

img{
max-width:80%;
max-height:65vh;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.4);
}

input, button{
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

/* Progress bar */
#progress{
position:fixed;
top:0;
left:0;
height:5px;
width:0%;
background:#ff4d6d;
z-index:999;
transition:12s linear;
}

/* Hearts */
.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 8s linear infinite;
opacity:0.8;
}

@keyframes floatUp{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>

<body>

<div id="progress"></div>
<div class="stars"></div>

<!-- LOGIN PAGE -->
<div class="page active" id="login">
<h1>❤️ A Surprise For Gullumullu ❤️</h1>
<p>Enter the secret password</p>
<input id="password" type="password">
<button onclick="checkPass()">📸 Start Memory Journey ❤️</button>
<br>
<button onclick="openQuiz()">❤️ Our Quiz</button>
<br>
<button onclick="dontClick()">🚫 Don't Click</button>
</div>

<!-- SLIDES -->
<div class="page" id="slide1"><h1>Happy Birthday Rishika ❤️</h1></div>
<div class="page" id="slide2"><p>Some people become memories ❤️</p></div>
<div class="page" id="slide3"><img src="IMG_20260209_022837_068.jpg"></div>
<div class="page" id="slide4"><img src="Snapchat-478542105.jpg"></div>
<div class="page" id="slide5"><img src="IMG_20260211_031208_494.jpg"></div>
<div class="page" id="slide6"><img src="IMG_20260313_142029.jpg"></div>
<div class="page" id="slide7"><img src="Screenshot_2026-02-28-02-26-20-53_965bbf4d18d205f782c6b8409c5773a4.jpg"></div>
<div class="page" id="slide8"><img src="Screenshot_2026-04-04-21-33-33-03_99c04817c0de5652397fc8b56c3b3817.jpg"></div>
<div class="page" id="slide9"><img src="Snapchat-1167328306.jpg"></div>
<div class="page" id="slide10"><img src="Snapchat-541767797.jpg"></div>
<div class="page" id="slide11"><img src="Snapchat-768854161.jpg"></div>

<!-- MUSIC -->
<iframe style="position:fixed;bottom:10px;left:10px;border-radius:12px;"
src="https://open.spotify.com/embed/track/1hQia6rxgfM1ly2hE3StWp"
width="300" height="80"></iframe>

<script>
let current = 1;
let intervalStarted = false;

function checkPass(){
let pass = document.getElementById("password").value;

if(pass === "2512"){

document.getElementById("login").classList.remove("active");
current = 1;
document.getElementById("slide1").classList.add("active");

if(intervalStarted) return;
intervalStarted = true;

setTimeout(()=>{

setInterval(()=>{

document.getElementById("slide"+current).classList.remove("active");

current++;

if(current > 11){
document.body.innerHTML = `
<div style="background:white;color:black;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;">
<h1>I Love You Rishika ❤️</h1>
<p>Forever yours, Your Baccha 🙈</p>
</div>`;
return;
}

document.getElementById("slide"+current).classList.add("active");

},5000);

},800);

}else{
alert("Wrong Password ❤️");
}
}

function openQuiz(){
document.body.innerHTML = `
<div style="background:black;color:white;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;">
<h1>❤️ Our Quiz ❤️</h1>
<p>Who is more dramatic? 🤣</p>
<button onclick="alert('No wrong answer 😭❤️')">Me</button>
<button onclick="alert('No wrong answer 😭❤️')">You</button>
<br><br>
<button onclick="location.reload()">Back</button>
</div>`;
}

function dontClick(){
document.body.innerHTML = `
<div style="background:black;color:white;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;">
<h1>🚫 I Told You Not To Click 😭</h1>
<p>World’s Cutest Person ❤️ Gullumullu</p>
<button onclick="location.reload()">Back</button>
</div>`;
}

function createHeart(){
let heart = document.createElement("div");
heart.innerHTML = "❤️";
heart.className = "heart";
heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = (20 + Math.random()*25) + "px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,1000);
</script>

</body>
</html>
